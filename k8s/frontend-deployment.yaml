# =============================================================================
# LIDAR Module Frontend (DEPRECATED)
# =============================================================================
# Nekazari no longer uses Module Federation. Frontend bundles are served from MinIO
# and loaded via runtime script injection:
#   /modules/<moduleId>/nkz-module.js
#
# This manifest is kept only as a legacy reference. It is intentionally scaled to 0
# and does NOT expose /modules/lidar via Ingress (that path must be served by the
# platform frontend-static proxy to MinIO).
# =============================================================================

---
# Deployment: LIDAR Module Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidar-frontend
  namespace: nekazari
  labels:
    app: lidar-frontend
    component: frontend
    module: lidar
    nekazari.io/profile: addon
spec:
  replicas: 0
  selector:
    matchLabels:
      app: lidar-frontend
  template:
    metadata:
      labels:
        app: lidar-frontend
        component: frontend
        module: lidar
    spec:
      containers:
        - name: frontend
          image: ghcr.io/k8-benetis/nkz-module-lidar/lidar-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
