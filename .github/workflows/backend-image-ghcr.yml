name: backend-image-ghcr

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable tag to publish (example: 2026-04-08-orion-refactor)"
        required: true
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-image-ghcr.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMMUTABLE_TAG="${{ github.event.inputs.image_tag }}"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            IMMUTABLE_TAG="sha-${SHORT_SHA}"
          fi
          echo "immutable_tag=${IMMUTABLE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/nkz-os/nkz-module-lidar/lidar-backend:${{ steps.tags.outputs.immutable_tag }}
            ghcr.io/nkz-os/nkz-module-lidar/lidar-backend:latest
